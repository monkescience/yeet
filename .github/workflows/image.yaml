name: Publish Image

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: yeet-image-${{ github.event.release.tag_name }}
  cancel-in-progress: true

env:
  KO_VERSION: v0.18.1 # renovate: datasource=github-releases depName=ko-build/ko

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Set up ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        with:
          version: ${{ env.KO_VERSION }}

      - name: Publish image to GHCR
        run: |
          ko build --bare \
            --tags "${RELEASE_TAG}" \
            --tags latest \
            --image-label "org.opencontainers.image.title=${IMAGE_TITLE}" \
            --image-label "org.opencontainers.image.description=${IMAGE_DESCRIPTION}" \
            --image-label "org.opencontainers.image.source=${IMAGE_SOURCE}" \
            --image-label "org.opencontainers.image.url=${IMAGE_SOURCE}" \
            --image-label "org.opencontainers.image.documentation=${IMAGE_DOCUMENTATION}" \
            --image-label "org.opencontainers.image.licenses=${IMAGE_LICENSE}" \
            --image-label "org.opencontainers.image.version=${RELEASE_TAG}" \
            --image-label "org.opencontainers.image.revision=${IMAGE_REVISION}" \
            --image-label "org.opencontainers.image.created=${IMAGE_CREATED}" \
            --image-annotation "org.opencontainers.image.title=${IMAGE_TITLE}" \
            --image-annotation "org.opencontainers.image.description=${IMAGE_DESCRIPTION}" \
            --image-annotation "org.opencontainers.image.source=${IMAGE_SOURCE}" \
            --image-annotation "org.opencontainers.image.url=${IMAGE_SOURCE}" \
            --image-annotation "org.opencontainers.image.documentation=${IMAGE_DOCUMENTATION}" \
            --image-annotation "org.opencontainers.image.licenses=${IMAGE_LICENSE}" \
            --image-annotation "org.opencontainers.image.version=${RELEASE_TAG}" \
            --image-annotation "org.opencontainers.image.revision=${IMAGE_REVISION}" \
            --image-annotation "org.opencontainers.image.created=${IMAGE_CREATED}" \
            ./cmd/yeet
        env:
          IMAGE_CREATED: ${{ github.event.release.published_at }}
          IMAGE_DESCRIPTION: "Yeet CLI for automated releases from conventional commits"
          IMAGE_DOCUMENTATION: "${{ github.server_url }}/${{ github.repository }}#readme"
          IMAGE_LICENSE: MIT
          IMAGE_REVISION: ${{ github.sha }}
          IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          IMAGE_TITLE: yeet
          RELEASE_TAG: ${{ github.event.release.tag_name }}
