name: Publish Binaries

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.4.1)
        required: true

permissions:
  contents: write

concurrency:
  group: yeet-binaries-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: true

env:
  GORELEASER_VERSION: v2.15.2 # renovate: datasource=github-releases depName=goreleaser/goreleaser

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Generate Homebrew tap token
        id: generate-tap-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ vars.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap

      - name: Generate Scoop bucket token
        id: generate-scoop-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ vars.SCOOP_APP_ID }}
          private-key: ${{ secrets.SCOOP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: scoop-bucket

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_TOKEN: ${{ steps.generate-tap-token.outputs.token }}
          SCOOP_BUCKET_TOKEN: ${{ steps.generate-scoop-token.outputs.token }}

      - name: Enable auto-merge on Homebrew tap PR
        if: ${{ !contains(env.RELEASE_TAG, '-') }}
        env:
          GH_TOKEN: ${{ steps.generate-tap-token.outputs.token }}
        run: |
          PR_URL=$(gh pr list --repo monkescience/homebrew-tap --head "yeet-${{ env.RELEASE_TAG }}" --json url --jq '.[0].url')
          if [ -n "$PR_URL" ]; then
            gh pr merge --auto --squash "$PR_URL" --repo monkescience/homebrew-tap
          fi

      - name: Enable auto-merge on Scoop bucket PR
        if: ${{ !contains(env.RELEASE_TAG, '-') }}
        env:
          GH_TOKEN: ${{ steps.generate-scoop-token.outputs.token }}
        run: |
          PR_URL=$(gh pr list --repo monkescience/scoop-bucket --head "yeet-${{ env.RELEASE_TAG }}" --json url --jq '.[0].url')
          if [ -n "$PR_URL" ]; then
            gh pr merge --auto --squash "$PR_URL" --repo monkescience/scoop-bucket
          fi
