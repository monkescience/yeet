name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: yeet-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT_VERSION: v2.11.1 # renovate: datasource=github-releases depName=golangci/golangci-lint

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

  coverage:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Measure head coverage
        id: head_coverage
        run: |
          set -euo pipefail
          go test ./... -covermode=atomic -coverpkg=./... -coverprofile=coverage.out
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')
          echo "total=${total}" >> "$GITHUB_OUTPUT"

      - name: Measure base coverage
        id: base_coverage
        working-directory: base
        run: |
          set -euo pipefail
          go test ./... -covermode=atomic -coverpkg=./... -coverprofile=coverage.out
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')
          echo "total=${total}" >> "$GITHUB_OUTPUT"

      - name: Check coverage regression
        env:
          BASE_COVERAGE: ${{ steps.base_coverage.outputs.total }}
          HEAD_COVERAGE: ${{ steps.head_coverage.outputs.total }}
        run: |
          python3 - <<'PY'
          from decimal import Decimal
          import os

          base = Decimal(os.environ["BASE_COVERAGE"])
          head = Decimal(os.environ["HEAD_COVERAGE"])
          delta = head - base
          delta_sign = "+" if delta >= 0 else ""

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Coverage\n\n")
              summary.write("| Metric | Value |\n")
              summary.write("| --- | ---: |\n")
              summary.write(f"| Base | {base}% |\n")
              summary.write(f"| Head | {head}% |\n")
              summary.write(f"| Delta | {delta_sign}{delta}% |\n")

          if head < base:
              raise SystemExit(f"coverage decreased from {base}% to {head}%")
          PY

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: ./...
