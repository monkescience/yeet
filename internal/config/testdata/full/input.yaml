versioning: calver
branch: develop
provider: gitlab
version_files:
  - VERSION
  - cmd/yeet/version.txt
repository:
  remote: upstream
  host: gitlab.company.com
  project: group/subgroup/service
changelog:
  file: CHANGES.md
  include:
    - feat
    - fix
  sections:
    feat: New Features
    fix: Bug Fixes
calver:
  format: YYYY.0M.MICRO
release:
  subject_include_branch: true
  auto_merge: true
  auto_merge_force: true
  auto_merge_method: rebase
  pr_body_header: |-
    ## Release checklist
    - [ ] smoke test
  pr_body_footer: _Generated by automation_
targets:
  api:
    type: path
    path: services/api
    tag_prefix: api-v
